<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #0a0c10;
      --surface: rgba(22, 26, 34, 0.9);
      --surface-strong: rgba(32, 38, 49, 0.9);
      --border: rgba(255, 255, 255, 0.1);
      --text-primary: #F8FAFC;
      --text-secondary: #94A3B8;
      --accent: #00A3FF;
      --accent-hover: #21B1FF;
      --green: #10B981;
      --red: #EF4444;
      --toggle-off: rgba(148, 163, 184, 0.28);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 240px;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      color: var(--text-primary);
      overflow: hidden;
    }

    .popup-shell {
      padding: 12px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .logo {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .logo img {
      width: 24px;
      height: 24px;
      display: block;
    }

    .header-text h1 {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .header-text p {
      font-size: 10px;
      color: var(--text-secondary);
    }

    /* Toggle row */
    .toggle-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .toggle-label span {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: var(--toggle-off);
      transition: background 0.2s;
    }

    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }

    .toggle input:checked ~ .toggle-track {
      background: var(--accent);
    }

    .toggle input:checked ~ .toggle-thumb {
      transform: translateX(16px);
    }

    /* Status row */
    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }

    .status-row.dimmed { opacity: 0.5; }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--toggle-off);
    }

    .status-dot.connected { background: var(--green); box-shadow: 0 0 8px rgba(16,185,129,0.5); }
    .status-dot.disconnected { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,0.4); }
    .status-dot.connecting { background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .status-text {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-primary);
      flex: 1;
    }

    .status-detail {
      font-size: 10px;
      color: var(--text-secondary);
      font-family: "SF Mono", "Fira Code", monospace;
    }

    /* Button */
    .btn-reconnect {
      width: 100%;
      padding: 7px 0;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-reconnect:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-reconnect:disabled {
      background: var(--surface-strong);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      cursor: not-allowed;
    }
  </style>
</head>
<body>
<div class="popup-shell">

  <div class="header">
    <div class="logo">
      <img src="icons/icon.svg" alt="ChromeX">
    </div>
    <div class="header-text">
      <h1>ChromeX</h1>
      <p>Browser MCP Bridge</p>
    </div>
  </div>

  <div class="toggle-row">
    <div class="toggle-label">
      <span id="toggleHint">启用连接</span>
    </div>
    <label class="toggle">
      <input type="checkbox" id="enableToggle" checked>
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
  </div>

  <div class="status-row" id="statusCard">
    <span id="dot" class="status-dot disconnected"></span>
    <span class="status-text" id="statusText">检测中...</span>
    <span class="status-detail" id="statusDetail">:8765</span>
  </div>

  <button id="reconnectBtn" class="btn-reconnect">重新连接</button>

  <script src="popup.js"></script>
</div>
</body>
</html>
