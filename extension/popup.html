<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #f5f5f5;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #34C759; }
    .dot.disconnected { background: #FF3B30; }
    .status-text { flex: 1; }
    .btn {
      display: block;
      width: 100%;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      background: #007AFF;
      color: white;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
    }
    .btn:hover { background: #0063CC; }
    .btn:disabled { background: #999; cursor: not-allowed; }
    .info {
      margin-top: 10px;
      font-size: 11px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Link2Chrome</h1>
  </div>
  <div class="status-row">
    <span id="dot" class="dot disconnected"></span>
    <span id="statusText" class="status-text">检测中...</span>
  </div>
  <button id="reconnectBtn" class="btn">重新连接</button>
  <p class="info">WebSocket → ws://localhost:8765</p>
  <script src="popup.js"></script>
</body>
</html>
